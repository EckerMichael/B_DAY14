<head>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box
 }

body{
  background:#000;
  color:#00ff66;
/*  height:100vh; */
/*  overflow:hidden; */
  font-family:"Courier New",monospace
  }

/* SECTIONS */
#lockscreen{
  width:100vw;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center
}

/* SYMBOL BAR */
#symbols{
  font-size:36px;
  letter-spacing:14px;
  margin-bottom:50px;
  white-space:nowrap
}

/* PASSWORD INPUT */
input[type=password]
{
  background:#000;
  border:5px solid #00ff66;
  color:#00ff66;
  font-size:22px;
  padding:14px;
  text-align:center;
  outline:none;
  width:75%;
  max-width:280px;
  box-shadow:
   0 0 12px #00ff66,
   0 0 30px #00ff66,
   0 0 60px rgba(0,255,102,.9)
 }

/* FLASH OVERLAY */
#flash, #crack
 {
  position:fixed;
  inset:0;opacity:0;
  pointer-events:none
 }

#flash
 {
 background:rgba(255,0,0,.7);
 z-index:10
 }

#crack
 {
  background-image:repeating-linear-gradient(25deg,rgba(255,255,255,.2)0,
  rgba(255,255,255,.2)2px,transparent 2px,transparent 40px),repeating-linear-gradient(-40deg,rgba(255,255,255,.15)0,
  rgba(255,255,255,.15)1px,transparent 1px,transparent 30px);
  z-index:11
 }

</style>
</head>

<body>
<div id="flash"></div>
<div id="crack"></div>
<div id="lockscreen">

<div>
    <br>тЯБтНЬтОК тОКтЯТтНЬтМм тМЦтНЯ тЯТтОК тНЬтзЦ тЯТ
    <br>тзЦтМмтОФтЯБтНЯтМЦ тМЦтОФтНЯ тЯБтМЦ тНЬтзЦ тМЦ
    <br>тМмтМмтЯБтМЦ тМЦтОФтзЦ тЯТтзЦтЯБтМЦ тНЯтзЦтМЦтОК
    <br>тОФтМмтОФтЯБтзЦтЯТтНЬ тНЬтзЦтЯБтМЦтНЯтОК тОКтЯТ
</div>

<div id="symbols"></div>
<input id="password" type="password" placeholder="тЯБтЯТтЯБтЯТтЯБтЯТ">
</div>

<script>
const alienSymbols=["тМм","тНЬ","тОФ","тЯБ","тзЦ","тМЦ","тНЯ","тОК"],
counter=[0,0,0,0,0],
symbolBox=document.getElementById("symbols");

function updateCounter()
 {
  for(let i=counter.length-1;i>=0;i--)
   {
    counter[i]++;
     if(counter[i]<alienSymbols.length)break;counter[i]=0;
   }
   symbolBox.textContent=
    /*    fixedSymbol + "" + */
          /*    fixedSymbol + "=" + */   
    counter.map(i=>alienSymbols[i]).join("");
  }
// тП▒ 80 ms Rhythmus
setInterval(updateCounter,80);

/* PASSWORD LOGIC */
const passwordMap={
NEON1:"Einladung1.html",
NEON2:"Einladung2.html",
NEON3:"Einladung3.html",
NEON4:"Einladung4.html",
NEON5:"Einladung5.html",
NEON6:"Einladung6.html",
NEON7:"Einladung7.html",
NEON8:"Einladung8.html",
NEON9:"Einladung9.html",
NEON10:"Einladung10.html"
};

const input=document.getElementById("password"), flash=document.getElementById("flash"), crack=document.getElementById("crack");

function redFlash(t)
 {
  let c=0;
  const i=setInterval(()=>
   {
    flash.style.opacity=flash.style.opacity=="1"?"0":"1";
    c++;
    if(c>=t*2)
     {
      flash.style.opacity="0";
      clearInterval(i)
     }
   }
   ,120)
  }


input.addEventListener("keydown",e=>
 {
  if(e.key==="Enter")
   {
   const target=passwordMap[input.value.trim()];
   if(target)
    {
     window.location.href=target;
    }
   else
    {
     input.value="";
     redFlash(4);
     setTimeout(()=>crack.style.opacity="1",500);
     setTimeout(()=>crack.style.opacity="0",5500);
    }
  }
 }
);
</script>

</body>
</html>
