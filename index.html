<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>c45TZd3</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #000;
  color: #00ff66;
  height: 100vh;
  overflow: hidden;
  font-family: "Courier New", monospace;
}

/* SECTIONS */
#lockscreen, #invite {
  width: 100vw;
  height: 100vh;
  display: none;
}

#lockscreen {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* SYMBOL BAR */
#symbols {
  font-size: 36px;
  letter-spacing: 14px;
  margin-bottom: 50px;
  white-space: nowrap;
}

/* PASSWORD INPUT */
input[type="password"] {
  background: black;
  border: 5px solid #00ff66;
  color: #00ff66;
  font-size: 22px;
  padding: 14px;
  text-align: center;
  outline: none;
  width: 75%;
  max-width: 280px;
  box-shadow:
    0 0 12px #00ff66,
    0 0 30px #00ff66,
    0 0 60px rgba(0,255,102,0.9);
}

/* FLASH OVERLAY */
#flash {
  position: fixed;
  inset: 0;
  background: rgba(255,0,0,0.7);
  opacity: 0;
  pointer-events: none;
  z-index: 10;
}

/* GLASS CRACK */
#crack {
  position: fixed;
  inset: 0;
  background-image:
    repeating-linear-gradient(25deg,
      rgba(255,255,255,0.2) 0px,
      rgba(255,255,255,0.2) 2px,
      transparent 2px,
      transparent 40px),
    repeating-linear-gradient(-40deg,
      rgba(255,255,255,0.15) 0px,
      rgba(255,255,255,0.15) 1px,
      transparent 1px,
      transparent 30px);
  opacity: 0;
  pointer-events: none;
  z-index: 11;
}

/* INVITATION */
#invite {
  background: linear-gradient(135deg, #ffd86b, #ff8ec7);
  color: #222;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

#invite h1 {
  font-size: 34px;
  margin-bottom: 12px;
}

#invite p {
  font-size: 20px;
  margin: 8px 0;
}
</style>
</head>

<body>

<div id="flash"></div>
<div id="crack"></div>

<!-- LOCKSCREEN -->
<div id="lockscreen">
  <div ">
    <br>⟁⍜⎊ ⎊⟒⍜⌬ ⌖⍟ ⟒⎊ ⍜⧖ ⟒
    <br>⧖⌬⎔⟁⍟⌖ ⌖⎔⍟ ⟁⌖ ⍜⧖ ⌖
    <br>⌬⌬⟁⌖ ⌖⎔⧖ ⟒⧖⟁⌖ ⍟⧖⌖⎊
    <br>⎔⌬⎔⟁⧖⟒⍜ ⍜⧖⟁⌖⍟⎊ ⎊⟒
  </div>
  <div id="symbols">⟒ ⟒ ⌬ ⌬ ⌬ ⌬ ⌬</div>
  <input id="password" type="password" placeholder="⟁⟒⟁⟒⟁⟒">
</div>

<!-- INVITATION -->
<div id="invite">
  <h1>🎉 Geburtstagsparty 🎉</h1>
  <p><strong>Name:</strong> NAME</p>
  <p><strong>Datum:</strong> DATUM</p>
  <p><strong>Uhrzeit:</strong> UHRZEIT</p>
  <p><strong>Ort:</strong> Musterstraße 12, Berlin</p>
  <p>Du hast das System überwunden 👽</p>
</div>

<script>
/* SYMBOL COUNTER */
const fixedSymbol = "⟒";
const alienSymbols = ["⌬","⍜","⎔","⟁","⧖","⌖","⍟","⎊"];
let counter = [0,0,0,0,0];
const symbolBox = document.getElementById("symbols");

function updateCounter() {
  for (let i = counter.length - 1; i >= 0; i--) {
    counter[i]++;
    if (counter[i] < alienSymbols.length) break;
    counter[i] = 0;
  }

  symbolBox.textContent =
/*    fixedSymbol + "" + */
/*    fixedSymbol + "=" + */
    counter.map(i => alienSymbols[i]).join("");
}

// ⏱ 80 ms Rhythmus
setInterval(updateCounter, 80);

/* PASSWORD LOGIC */
const validPasswords = [
  "NEON1","NEON2","NEON3","NEON4","NEON5",
  "NEON6","NEON7","NEON8","NEON9","NEON10"
];

const input = document.getElementById("password");
const flash = document.getElementById("flash");
const crack = document.getElementById("crack");

function redFlash(times) {
  let count = 0;
  const interval = setInterval(() => {
    flash.style.opacity = (flash.style.opacity == "1") ? "0" : "1";
    count++;
    if (count >= times * 2) {
      flash.style.opacity = "0";
      clearInterval(interval);
    }
  }, 120);
}

input.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    if (validPasswords.includes(input.value)) {
      document.getElementById("lockscreen").style.display = "none";
      document.getElementById("invite").style.display = "flex";
    } else {
      input.value = "";

      // 4x red flash
      redFlash(4);

      // glass crack for 5 seconds
      setTimeout(() => crack.style.opacity = "1", 500);
      setTimeout(() => crack.style.opacity = "0", 5500);
    }
  }
});
</script>

</body>
</html>
